# render.yaml – MediQuick deployment config
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: mediquick
    runtime: node
    # Build from repo root, cd into backend explicitly (rootDir alone is unreliable)
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false   # set manually in Render dashboard → Environment
      - key: JWT_SECRET
        sync: false   # set manually in Render dashboard → Environment
      - key: NODE_ENV
        value: production
