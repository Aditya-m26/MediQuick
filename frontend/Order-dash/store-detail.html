<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediQuick – Store Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="store-detail.css" />
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="sd-header">
        <div class="sd-header-left">
            <a href="request.html" class="sd-back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
        </div>
        <div class="sd-header-right">
            <a href="cart.html" class="sd-icon-link"><i class="fa-solid fa-cart-shopping"></i></a>
            <a href="../Profile-dash/index.html" class="sd-icon-link"><i class="fa-solid fa-user"></i></a>
        </div>
    </header>

    <!-- ===== LOADING ===== -->
    <div id="stateLoading" class="sd-loading">
        <div class="sd-spinner"></div>
        <p>Loading store details…</p>
    </div>

    <!-- ===== MAIN DETAIL ===== -->
    <div id="storeDetail" class="hidden">

        <!-- ─── HERO: Two-Column (Photo Left, Info Right) ─── -->
        <section class="sd-hero">

            <!-- Left: Store Photo -->
            <div class="sd-hero-img" id="heroImgSide">
                <img id="heroPhoto" src="" alt="Store" />
                <div class="sd-hero-placeholder" id="heroPlaceholder">
                    <i class="fa-solid fa-store"></i>
                </div>
                <span class="sd-status-chip" id="statusChip">Open</span>
            </div>

            <!-- Right: Store Info -->
            <div class="sd-hero-info">
                <div class="sd-name-row">
                    <h1 id="storeName">—</h1>
                    <div class="sd-rating" id="ratingRow"></div>
                </div>

                <p class="sd-address" id="storeAddress">
                    <i class="fa-solid fa-location-dot"></i> <span>—</span>
                </p>

                <div class="sd-meta">
                    <p id="storeTimings"><i class="fa-regular fa-clock"></i> <span>—</span></p>
                    <p id="storePhone"><i class="fa-solid fa-phone"></i> <span>—</span></p>
                    <p id="storeDelivery"><i class="fa-solid fa-truck-fast"></i> <span>—</span></p>
                    <p id="storeLicence"><i class="fa-solid fa-id-card"></i> <span>—</span></p>
                    <p id="storePincode"><i class="fa-solid fa-map-pin"></i> <span>—</span></p>
                </div>

                <!-- Select Store CTA -->
                <button class="sd-select-btn" id="selectBtn" onclick="selectStore()">
                    <i class="fa-solid fa-circle-check"></i> Select This Store
                </button>
            </div>

        </section>

    </div><!-- /storeDetail -->

    <!-- ===== FLOATING CHAT WIDGET ===== -->
    <button class="chat-fab" id="chatFab" onclick="toggleChat()">
        <i class="fa-solid fa-comments"></i>
    </button>

    <div class="chat-widget hidden" id="chatWidget">
        <div class="cw-header">
            <span><i class="fa-solid fa-comments"></i> Chat with Pharmacist</span>
            <button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="cw-body" id="chatWindow">
            <div class="cw-bubble pharmacist">
                <p>Hello! How can I help you? Pick a quick question below or type your own.</p>
            </div>
        </div>

        <div class="cw-quick" id="quickReplies">
            <button onclick="sendQuick('Is this medicine available?')"><i class="fa-solid fa-pills"></i> Medicine
                available?</button>
            <button onclick="sendQuick('Do you have an alternative?')"><i class="fa-solid fa-right-left"></i>
                Alternatives?</button>
            <button onclick="sendQuick('What is the price?')"><i class="fa-solid fa-indian-rupee-sign"></i>
                Price?</button>
            <button onclick="sendQuick('How long will delivery take?')"><i class="fa-solid fa-truck-fast"></i> Delivery
                time?</button>
            <button onclick="sendQuick('Do you accept prescriptions online?')"><i class="fa-solid fa-file-medical"></i>
                Online Rx?</button>
            <button onclick="sendQuick('Bulk order discount?')"><i class="fa-solid fa-percent"></i> Bulk
                discount?</button>
        </div>

        <div class="cw-input">
            <input id="chatInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMsg()" />
            <button onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="sd-toast" id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg"></span>
    </div>

    <script src="store-detail.js"></script>
</body>

</html>
